site_name: ARC-1 — SAP ADT MCP Server
site_description: Enterprise-ready MCP proxy for SAP ABAP Development Tools. npm package + Docker image, admin safety controls, works with Claude, Copilot, and all MCP clients.
site_url: https://marianfoo.github.io/arc-1/
repo_url: https://github.com/marianfoo/arc-1
repo_name: marianfoo/arc-1
edit_uri: edit/main/docs_page/

docs_dir: docs_page

theme:
  name: material
  palette:
    - scheme: default
      primary: deep orange
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: deep orange
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.top
    - navigation.instant
    - navigation.expand
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
  icon:
    repo: fontawesome/brands/github

nav:
  - Home: index.md
  - Getting Started:
      - Quickstart: quickstart.md
      - Local Development: local-development.md
      - CLI Guide: cli-guide.md
      - SAP Trial Setup: sap-trial-setup.md
  - Deployment:
      - Overview: deployment.md
      - Docker: docker.md
      - BTP Cloud Foundry: phase4-btp-deployment.md
      - BTP ABAP Environment: btp-abap-environment.md
      - Best Practices: deployment-best-practices.md
  - Authentication:
      - Overview: enterprise-auth.md
      - Authorization & Roles: authorization.md
      - API Key: api-key-setup.md
      - OAuth / JWT: oauth-jwt-setup.md
      - Principal Propagation: principal-propagation-setup.md
      - XSUAA Setup: xsuaa-setup.md
      - BTP Destination Setup: btp-destination-setup.md
      - Auth Test Process: auth-test-process.md
  - Using ARC-1:
      - Tools Reference: tools.md
      - MCP Usage Guide: mcp-usage.md
      - Skills: skills.md
  - Reference:
      - Architecture: architecture.md
      - Configuration: configuration-reference.md
      - Caching: caching.md
      - Security: security-guide.md
      - Updating: updating.md
      - Log Analysis: log-analysis.md
      - Roadmap: roadmap.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

plugins:
  - search

extra_javascript:
  - javascripts/posthog.js

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/marianfoo/arc-1
