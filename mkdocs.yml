site_name: ARC-1 — SAP ADT MCP Server
site_description: Enterprise-ready MCP proxy for SAP ABAP Development Tools. npm package + Docker image, admin safety controls, works with Claude, Copilot, and all MCP clients.
site_url: https://marianfoo.github.io/arc-1/
repo_url: https://github.com/marianfoo/arc-1
repo_name: marianfoo/arc-1
edit_uri: edit/main/docs/

docs_dir: docs

theme:
  name: material
  palette:
    - scheme: default
      primary: deep orange
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: deep orange
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.top
    - navigation.instant
    - navigation.expand
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
  icon:
    repo: fontawesome/brands/github

nav:
  - Home: index.md
  - Getting Started:
      - Setup Guide: setup-guide.md
      - CLI Guide: cli-guide.md
      - SAP Trial Setup: sap-trial-setup.md
  - Using arc1:
      - Tools Reference: tools.md
      - MCP Usage Guide: mcp-usage.md
  - Deployment:
      - Docker: docker.md
      - BTP Cloud Foundry: phase4-btp-deployment.md
  - Authentication:
      - Overview: enterprise-auth.md
      - Phase 1 – API Key: phase1-api-key-setup.md
      - Phase 2 – OAuth / JWT: phase2-oauth-setup.md
      - Phase 3 – Principal Propagation: phase3-principal-propagation-setup.md
      - Phase 5 – XSUAA Setup: phase5-xsuaa-setup.md
      - BTP Destination Setup: btp-destination-setup.md
      - Auth Test Process: auth-test-process.md
  - Reference:
      - Architecture: architecture.md
      - Roadmap: roadmap.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

plugins:
  - search

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/marianfoo/arc-1
